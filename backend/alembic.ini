# Alembic Configuration — GMP Platform
# The sqlalchemy.url is overridden at runtime from the DATABASE_URL environment variable
# in alembic/env.py — the value here is a placeholder only.

[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os

# Placeholder URL — must use an async driver for Alembic online mode (asyncpg).
# env.py also normalizes postgresql:// → postgresql+asyncpg:// when needed.
sqlalchemy.url = postgresql+asyncpg://gmp_user:changeme@localhost:5432/gmp_platform

[post_write_hooks]
# Configure hooks run after generating new revision scripts
# hooks = autopep8
# autopep8.type = console_scripts
# autopep8.entrypoint = autopep8
# autopep8.options = -W0 {filename}

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
