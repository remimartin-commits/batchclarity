name: Quality Gates

on:
  push:
    branches:
      - main

jobs:
  backend-quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Format check
        run: python -m ruff format --check backend

      - name: Lint
        run: python -m ruff check backend

      - name: Type check (strict)
        run: python -m mypy --config-file pyproject.toml

      - name: Architecture tests
        run: python -m pytest backend/tests/test_architecture_boundaries.py -q

      - name: Generate docs artifacts
        run: python backend/scripts/generate-docs.py
